<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>20 LPA+ Placement Roadmap Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --bg2: #0f1626;
      --bg3: #141c2e;
      --card: #1a2238;
      --card2: #1e2940;
      --border: #2a3555;
      --border2: #364070;
      --accent: #4f8ef7;
      --accent2: #7c6af7;
      --green: #2dd4a0;
      --red: #f7635a;
      --yellow: #f7c948;
      --orange: #f79c4f;
      --pink: #f76ab4;
      --text: #e8edf8;
      --text2: #9aaac8;
      --text3: #5a6b8a;
      --glow: rgba(79,142,247,0.15);
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── layout ── */
    .app { max-width: 1200px; margin: 0 auto; padding: 24px 20px 60px; }

    /* ── header ── */
    .header {
      text-align: center;
      padding: 40px 0 32px;
      position: relative;
    }
    .header::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 200px;
      background: radial-gradient(ellipse at center, rgba(79,142,247,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .header h1 {
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 700;
      line-height: 1.15;
      background: linear-gradient(135deg, #fff 0%, #9aaac8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    .header-sub {
      color: var(--text2);
      font-size: 14px;
      letter-spacing: 0.03em;
    }

    /* ── stats row ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
      margin: 28px 0;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 16px;
      text-align: center;
      transition: border-color 0.2s, transform 0.2s;
    }
    .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }
    .stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }

    /* ── section headers ── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 36px 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── phase cards ── */
    .phases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .phase-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .phase-card:hover { border-color: var(--border2); box-shadow: 0 0 24px var(--glow); }
    .phase-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .phase-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .phase-dates {
      font-size: 11px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
    }
    .phase-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 700;
    }
    .progress-track {
      height: 8px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 6px; height: 100%;
      background: rgba(255,255,255,0.4);
      border-radius: 4px;
      filter: blur(2px);
    }
    .phase-meta {
      font-size: 11px;
      color: var(--text3);
      display: flex;
      justify-content: space-between;
    }
    .behind-tag {
      background: rgba(247,99,90,0.15);
      color: var(--red);
      border: 1px solid rgba(247,99,90,0.3);
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      letter-spacing: 0.05em;
    }
    .on-track-tag {
      background: rgba(45,212,160,0.12);
      color: var(--green);
      border: 1px solid rgba(45,212,160,0.25);
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
    }
    .done-tag {
      background: rgba(79,142,247,0.12);
      color: var(--accent);
      border: 1px solid rgba(79,142,247,0.25);
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
    }

    /* ── weeks ── */
    .weeks-grid {
      display: grid;
      gap: 10px;
    }
    .week-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .week-row:hover { border-color: var(--border2); }
    .week-row.current { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(79,142,247,0.2); }
    .week-row.behind { border-color: rgba(247,99,90,0.4); }
    .week-row-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .week-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      min-width: 56px;
    }
    .week-goal {
      flex: 1;
      font-size: 13px;
      color: var(--text2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .week-progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 160px;
    }
    .week-track {
      flex: 1;
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }
    .week-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .week-pct-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      min-width: 30px;
      text-align: right;
    }
    .week-days-expanded {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
    }
    .day-chip {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .day-chip:hover { border-color: var(--border2); }
    .day-chip.done { background: rgba(45,212,160,0.06); border-color: rgba(45,212,160,0.25); }
    .day-chip-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      flex-shrink: 0;
      margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      cursor: pointer;
    }
    .day-chip-dot.done {
      background: var(--green);
      border-color: var(--green);
    }
    .day-chip-dot.done::after {
      content: '✓';
      font-size: 8px;
      color: #0a0e1a;
      font-weight: 800;
    }
    .day-name { font-size: 10px; font-weight: 600; color: var(--text3); display: block; margin-bottom: 2px; }
    .day-task { font-size: 11px; color: var(--text2); line-height: 1.35; }

    /* ── streak ── */
    .streak-card {
      background: linear-gradient(135deg, rgba(247,201,72,0.08), rgba(247,156,79,0.05));
      border: 1px solid rgba(247,201,72,0.2);
      border-radius: 16px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .streak-flame {
      font-size: 42px;
      line-height: 1;
      filter: drop-shadow(0 0 12px rgba(247,201,72,0.5));
    }
    .streak-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 48px;
      font-weight: 700;
      color: var(--yellow);
      line-height: 1;
    }
    .streak-info { flex: 1; }
    .streak-label { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
    .streak-sub { font-size: 11px; color: var(--text3); }

    /* ── heatmap ── */
    .heatmap-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 20px;
      overflow-x: auto;
    }
    .heatmap-grid {
      display: flex;
      gap: 3px;
      min-width: max-content;
    }
    .heatmap-col {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .heatmap-cell {
      width: 13px; height: 13px;
      border-radius: 3px;
      cursor: pointer;
      transition: transform 0.1s;
      position: relative;
    }
    .heatmap-cell:hover { transform: scale(1.4); z-index: 2; }
    .heatmap-week-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text3);
      text-align: center;
      margin-bottom: 4px;
    }
    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 11px;
      color: var(--text3);
    }
    .heatmap-month-row {
      display: flex;
      gap: 3px;
      margin-bottom: 4px;
      min-width: max-content;
    }
    .month-label-cell {
      width: 13px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      color: var(--text3);
      text-align: center;
      white-space: nowrap;
      overflow: visible;
    }

    /* ── daily score ── */
    .score-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 24px;
    }
    .score-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .score-title {
      font-size: 15px;
      font-weight: 600;
    }
    .score-today {
      font-family: 'JetBrains Mono', monospace;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
    }
    .score-bars {
      display: grid;
      gap: 12px;
    }
    .score-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .score-item-label {
      font-size: 12px;
      color: var(--text2);
      min-width: 110px;
    }
    .score-item-track {
      flex: 1;
      height: 7px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
    }
    .score-item-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .score-item-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      min-width: 36px;
      text-align: right;
    }

    /* ── update button ── */
    .update-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .update-btn:hover { opacity: 0.85; }
    .update-btn:active { transform: scale(0.97); }

    /* ── toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 24px;
      background: var(--card2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 999;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 8px 16px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text3);
      transition: all 0.2s;
      border: none;
      background: none;
      font-family: 'Space Grotesk', sans-serif;
    }
    .tab:hover { color: var(--text2); }
    .tab.active {
      background: var(--card2);
      color: var(--text);
      border: 1px solid var(--border2);
    }

    /* ── tooltip ── */
    .tooltip-wrap { position: relative; }
    .tooltip-wrap:hover .tooltip { display: block; }
    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--card2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 7px;
      font-size: 11px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }

    /* ── two col ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 700px) {
      .two-col { grid-template-columns: 1fr; }
      .week-goal { display: none; }
      .week-progress-wrap { min-width: 100px; }
    }

    /* ── glow colors ── */
    .c-blue { color: var(--accent); }
    .c-green { color: var(--green); }
    .c-red { color: var(--red); }
    .c-yellow { color: var(--yellow); }
    .c-purple { color: var(--accent2); }
    .c-orange { color: var(--orange); }

    /* ── backup plans ── */
    .bp-hero {
      border-radius: 18px;
      padding: 28px 26px 22px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .bp-hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      border-radius: 50%;
      opacity: 0.07;
    }
    .bp-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .bp-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .bp-subtitle {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .bp-trigger {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .bp-trigger-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
      opacity: 0.6;
    }
    .bp-trigger-text {
      font-size: 13px;
      line-height: 1.5;
    }
    .bp-phases {
      display: grid;
      gap: 10px;
    }
    .bp-phase-row {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 12px;
      align-items: start;
    }
    .bp-phase-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 6px;
      text-align: center;
      line-height: 1.3;
    }
    .bp-phase-content {}
    .bp-phase-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .bp-phase-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
    }
    .bp-phase-dates {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      white-space: nowrap;
      text-align: right;
      padding-top: 2px;
    }
    .bp-cuts {
      margin-top: 16px;
    }
    .bp-cuts-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.55;
      margin-bottom: 10px;
    }
    .bp-cut-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .bp-cut-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 12px;
      color: var(--text2);
      line-height: 1.45;
    }
    .bp-cut-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .bp-status-banner {
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bp-status-icon { font-size: 22px; flex-shrink: 0; }
    .bp-active-indicator {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .bp-active-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .bp-divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }
    .bp-compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .bp-compare-cell {
      background: var(--card);
      padding: 14px 16px;
    }
    .bp-compare-header {
      background: var(--bg3);
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    @media (max-width: 600px) {
      .bp-compare-grid { grid-template-columns: 1fr; }
      .bp-phase-row { grid-template-columns: 70px 1fr; }
      .bp-phase-dates { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ─── DATA ─────────────────────────────────────── */
// Parse as LOCAL midnight — avoids UTC offset shifting dates (critical for IST +5:30 etc.)
function localDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}
const START = localDate('2026-03-15');

/* ─── STORAGE UTILS ─────────────────────────────── */
const STORAGE_KEY = 'roadmap_v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return null;
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function makeDefault() {
  const days = {};
  WEEKS.forEach(w => {
    w.days.forEach((d, i) => {
      days[`${w.id}_${i}`] = false;
    });
  });
  return { days, lastUpdated: null };
}

/* ─── DATE UTILS ─────────────────────────────────── */
function today() {
  const d = new Date();
  // Strip time — returns local midnight, not UTC midnight
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

// Integer day difference (b - a), works on local-midnight dates only
function daysDiff(a, b) {
  return Math.round((b.getTime() - a.getTime()) / 86400000);
}

function totalDays() { return daysDiff(START, END) + 1; }
function daysSinceStart() { return Math.max(0, Math.min(daysDiff(START, today()), totalDays())); }
function overallPct() { return Math.round((daysSinceStart() / totalDays()) * 100); }

function getWeekForDate(d) {
  const diff = daysDiff(START, d);
  if (diff < 0) return 1;
  const wid = Math.floor(diff / 7) + 1;
  return Math.min(Math.max(wid, 1), 16);
}


// ── LIVE DATE LABEL HELPERS ──────────────────────
function weekDateLabel(weekId) {
  const wStart = new Date(START.getFullYear(), START.getMonth(), START.getDate() + (weekId - 1) * 7);
  const wEnd   = new Date(START.getFullYear(), START.getMonth(), START.getDate() + weekId * 7 - 1);
  const fmt = d => d.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
  return fmt(wStart) + '\u2013' + fmt(wEnd);
}
// Returns real calendar day name (e.g. "Thu") for a day slot in a given week
function realDayName(weekId, dayIndex) {
  const d = new Date(START.getFullYear(), START.getMonth(), START.getDate() + (weekId - 1) * 7 + dayIndex);
  return d.toLocaleDateString('en-IN', { weekday: 'short' });
}
// Returns real calendar date (e.g. "12 Mar") for a day slot in a given week
function realDayDate(weekId, dayIndex) {
  const d = new Date(START.getFullYear(), START.getMonth(), START.getDate() + (weekId - 1) * 7 + dayIndex);
  return d.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
}
function phaseDateLabel(phase) {
  const fmt = d => d.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
  return fmt(phase.start) + ' \u2013 ' + fmt(phase.end);
}
function currentWeekId() { return getWeekForDate(today()); }

/* ─── PHASE PROGRESS ─────────────────────────────── */
function phaseTimePct(phase) {
  const t = today();
  if (t < phase.start) return 0;
  if (t > phase.end) return 100;
  return Math.round((daysDiff(phase.start, t) / daysDiff(phase.start, phase.end)) * 100);
}

function phaseCompletionPct(phase, days) {
  const all = [], done = [];
  WEEKS.filter(w => phase.weeks.includes(w.id)).forEach(w => {
    w.days.forEach((_, i) => {
      all.push(1);
      if (days[`${w.id}_${i}`]) done.push(1);
    });
  });
  if (all.length === 0) return 0;
  return Math.round((done.length / all.length) * 100);
  // fixed: should be done count
}

function phaseCompletionPctFixed(phase, days) {
  let all = 0, done = 0;
  WEEKS.filter(w => phase.weeks.includes(w.id)).forEach(w => {
    w.days.forEach((_, i) => {
      all++;
      if (days[`${w.id}_${i}`]) done++;
    });
  });
  return all === 0 ? 0 : Math.round((done / all) * 100);
}

function weekCompletionPct(week, days) {
  let done = 0;
  week.days.forEach((_, i) => { if (days[`${week.id}_${i}`]) done++; });
  return Math.round((done / week.days.length) * 100);
}

/* ─── STREAK ──────────────────────────────────────── */
function computeStreak(days) {
  let streak = 0;
  const t = today();
  for (let back = 0; back < 200; back++) {
    // Build local date back `back` days — avoids DST issues with raw ms subtraction
    const d = new Date(t.getFullYear(), t.getMonth(), t.getDate() - back);
    const diff = daysDiff(START, d);
    if (diff < 0) break;
    const wid = Math.floor(diff / 7) + 1;
    const dayIdx = diff % 7;
    if (wid < 1 || wid > 16) { if (back === 0) continue; else break; }
    if (days[`${wid}_${dayIdx}`]) streak++;
    else if (back === 0) break;
    else break;
  }
  return streak;
}

/* ─── HEATMAP DATA ────────────────────────────────── */
function buildHeatmap(days) {
  const cells = [];
  const t = today();
  for (let i = 0; i < totalDays(); i++) {
    // Build each date as local midnight — avoids DST/UTC offset drift
    const d = new Date(START.getFullYear(), START.getMonth(), START.getDate() + i);
    const wid = Math.floor(i / 7) + 1;
    const dayIdx = i % 7;
    const key = `${wid}_${dayIdx}`;
    cells.push({
      date: d,
      key,
      done: !!days[key],
      isPast: d <= t,
      isToday: d.getTime() === t.getTime(),
      weekId: wid,
      dayIdx,
    });
  }
  return cells;
}

/* ─── DAILY SCORE ─────────────────────────────────── */
function dailyScore(days) {
  const t = today();
  const diff = daysDiff(START, t);
  if (diff < 0) return null;
  const wid = Math.floor(diff / 7) + 1;
  const dayIdx = diff % 7;
  if (wid < 1 || wid > 16) return null;
  const week = WEEKS.find(w => w.id === wid);
  if (!week) return null;
  const done = days[`${wid}_${dayIdx}`] ? 1 : 0;
  // Score components
  const weekPct = weekCompletionPct(week, days);
  const todayDone = done;
  const streak = computeStreak(days);
  const total = Math.min(100, Math.round(
    todayDone * 40 +
    Math.min(weekPct * 0.4, 40) +
    Math.min(streak * 2, 20)
  ));
  return { todayDone, weekPct, streak, total, week, wid, dayIdx };
}

/* ─── COMPONENT: PROGRESS BAR ─────────────────────── */
function ProgressBar({ pct, color, height=8 }) {
  return (
    <div className="progress-track" style={{height}}>
      <div
        className="progress-fill"
        style={{ width: `${pct}%`, background: color }}
      />
    </div>
  );
}

/* ─── COMPONENT: PHASE CARD ─────────────────────── */
function PhaseCard({ phase, days }) {
  const timePct = phaseTimePct(phase);
  const donePct = phaseCompletionPctFixed(phase, days);
  const behind = donePct < timePct - 10 && timePct > 0 && timePct < 100;
  const complete = timePct >= 100;
  const active = timePct > 0 && timePct < 100;

  return (
    <div className="phase-card">
      <div className="phase-header">
        <div>
          <div className="phase-name">{phase.name}</div>
          <div className="phase-dates">{phaseDateLabel(phase)}</div>
        </div>
        <div>
          <div className="phase-pct" style={{ color: phase.color }}>{donePct}%</div>
        </div>
      </div>

      <ProgressBar pct={donePct} color={phase.color} />
      <div style={{height:4}} />
      <ProgressBar pct={timePct} color={`${phase.color}44`} height={4} />

      <div className="phase-meta">
        <span>{timePct}% of time elapsed</span>
        <span>
          {complete ? <span className="done-tag">DONE</span>
            : behind  ? <span className="behind-tag">⚠ BEHIND</span>
            : active  ? <span className="on-track-tag">✓ ON TRACK</span>
            : <span style={{color:'var(--text3)',fontSize:10}}>Upcoming</span>}
        </span>
      </div>
    </div>
  );
}

/* ─── COMPONENT: WEEK ROW ─────────────────────── */
function WeekRow({ week, days, onToggle, currentWkId }) {
  const [expanded, setExpanded] = useState(week.id === currentWkId);
  const pct = weekCompletionPct(week, days);
  const phase = PHASES.find(p => p.weeks.includes(week.id));

  // is this week in the past?
  const wEnd = new Date(START.getFullYear(), START.getMonth(), START.getDate() + week.id * 7);
  const isPast = wEnd < today();
  const isCurrent = week.id === currentWkId;
  const behind = pct < 50 && isPast;

  const barColor = behind ? 'var(--red)'
    : pct === 100 ? 'var(--green)'
    : phase?.color || 'var(--accent)';

  return (
    <div
      className={`week-row${isCurrent ? ' current' : ''}${behind ? ' behind' : ''}`}
    >
      <div className="week-row-header" onClick={() => setExpanded(e => !e)} style={{cursor:'pointer'}}>
        <span className="week-label" style={{ color: phase?.color }}>{week.label}</span>
        <span style={{fontFamily:"'JetBrains Mono', monospace",fontSize:10,color:"var(--text3)",marginRight:4,whiteSpace:"nowrap"}}>{weekDateLabel(week.id)}</span>
        <span className="week-goal">{week.goal}</span>
        <div className="week-progress-wrap">
          <div className="week-track">
            <div className="week-fill" style={{ width:`${pct}%`, background: barColor }} />
          </div>
          <span className="week-pct-label" style={{ color: barColor }}>{pct}%</span>
          <span style={{ color:'var(--text3)', fontSize:11, marginLeft:4 }}>{expanded ? '▲' : '▼'}</span>
        </div>
      </div>

      {expanded && (
        <div className="week-days-expanded">
          {week.days.map((d, i) => {
            const key = `${week.id}_${i}`;
            const done = !!days[key];
            return (
              <div
                key={i}
                className={`day-chip${done ? ' done' : ''}`}
                onClick={() => onToggle(key)}
              >
                <div className={`day-chip-dot${done ? ' done' : ''}`} />
                <div>
                  <span className="day-name">{realDayName(week.id, i)} · {realDayDate(week.id, i)}</span>
                  <span className="day-task">{d.task}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── COMPONENT: HEATMAP ─────────────────────────── */
function Heatmap({ days }) {
  const cells = buildHeatmap(days);
  // Group into weeks (columns of 7)
  const numWeeks = Math.ceil(cells.length / 7);

  const getColor = (cell) => {
    if (cell.isToday && !cell.done) return 'rgba(79,142,247,0.5)';
    if (!cell.isPast) return 'var(--bg3)';
    if (cell.done) return '#2dd4a0';
    return '#1a2238';
  };

  // Build real month label positions from actual cell dates
  const monthLabels = {};
  cells.forEach((cell, i) => {
    const wi = Math.floor(i / 7);
    const mo = cell.date.getMonth();
    const key = `${cell.date.getFullYear()}-${mo}`;
    if (!monthLabels[key]) monthLabels[key] = { wi, label: cell.date.toLocaleDateString('en-IN', {month:'short'}) };
  });
  const monthPositions = Object.values(monthLabels);

  return (
    <div className="heatmap-wrap">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <span style={{fontSize:13,fontWeight:600}}>Activity Heatmap</span>
        <span style={{fontSize:11,color:'var(--text3)', fontFamily:'JetBrains Mono'}}>
          {cells.filter(c=>c.done).length} / {cells.length} days completed
        </span>
      </div>

      <div style={{overflowX:'auto',paddingBottom:8}}>
        {/* Month labels — positioned from real dates */}
        <div className="heatmap-month-row">
          {Array.from({length: numWeeks}).map((_, wi) => {
            const mo = monthPositions.find(m => m.wi === wi);
            return (
              <div key={wi} className="month-label-cell" style={{width:13}}>
                {mo ? mo.label : ''}
              </div>
            );
          })}
        </div>

        {/* Day-of-week labels + grid */}
        <div style={{display:'flex',gap:3}}>
          {/* Day labels */}
          <div style={{display:'flex',flexDirection:'column',gap:3,marginRight:4}}>
            {Array.from({length:7}, (_,i) => {
                const dd = new Date(START.getFullYear(), START.getMonth(), START.getDate() + i);
                return dd.toLocaleDateString('en-IN', {weekday:'narrow'});
              }).map((d,i)=>(
              <div key={i} style={{height:13,fontSize:8,color:'var(--text3)',lineHeight:'13px',textAlign:'right',fontFamily:'JetBrains Mono'}}>{d}</div>
            ))}
          </div>

          {/* Grid columns */}
          <div className="heatmap-grid">
            {Array.from({length: numWeeks}).map((_, wi) => (
              <div key={wi} className="heatmap-col">
                {Array.from({length:7}).map((_,di) => {
                  const cell = cells[wi*7+di];
                  if (!cell) return <div key={di} style={{width:13,height:13}} />;
                  const color = getColor(cell);
                  const dateStr = cell.date.toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'});
                  return (
                    <div key={di} className="tooltip-wrap">
                      <div
                        className="heatmap-cell"
                        style={{
                          background: color,
                          opacity: cell.isPast || cell.isToday ? 1 : 0.3,
                          outline: cell.isToday ? '2px solid var(--accent)' : 'none',
                          outlineOffset: '1px',
                        }}
                      />
                      <div className="tooltip">
                        {dateStr}{cell.isToday ? ' · Today' : ''}: {cell.done ? '✅ Done' : cell.isPast ? '⬜ Missed' : '🔒 Upcoming'}
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="heatmap-legend">
        <span>Less</span>
        {['#1a2238','#174d3a','#1f7a59','#2dd4a0'].map((c,i)=>(
          <div key={i} style={{width:13,height:13,background:c,borderRadius:3}} />
        ))}
        <span>More</span>
      </div>
    </div>
  );
}

/* ─── COMPONENT: DAILY SCORE ─────────────────────── */
function DailyScore({ days }) {
  const info = dailyScore(days);
  if (!info) return null;

  const { todayDone, weekPct, streak, total } = info;
  const scoreColor = total >= 80 ? 'var(--green)' : total >= 50 ? 'var(--accent)' : total >= 30 ? 'var(--yellow)' : 'var(--red)';

  return (
    <div className="score-section">
      <div className="score-header">
        <div>
          <div className="score-title">Today's Score</div>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>
            {new Date().toLocaleDateString('en-IN',{weekday:'long',month:'long',day:'numeric'})}
          </div>
        </div>
        <div>
          <div className="score-today" style={{color:scoreColor}}>{total}</div>
          <div style={{fontSize:10,color:'var(--text3)',textAlign:'right'}}>/100</div>
        </div>
      </div>

      <div className="score-bars">
        <div className="score-item">
          <span className="score-item-label">Today's Task</span>
          <div className="score-item-track">
            <div className="score-item-fill" style={{width:`${todayDone*100}%`,background:'var(--green)'}} />
          </div>
          <span className="score-item-val">{todayDone ? '✓' : '○'}</span>
        </div>
        <div className="score-item">
          <span className="score-item-label">Week Progress</span>
          <div className="score-item-track">
            <div className="score-item-fill" style={{width:`${weekPct}%`,background:'var(--accent)'}} />
          </div>
          <span className="score-item-val">{weekPct}%</span>
        </div>
        <div className="score-item">
          <span className="score-item-label">Streak Bonus</span>
          <div className="score-item-track">
            <div className="score-item-fill" style={{width:`${Math.min(streak*10,100)}%`,background:'var(--yellow)'}} />
          </div>
          <span className="score-item-val">{streak}d</span>
        </div>
      </div>
    </div>
  );
}

/* ─── MAIN APP ──────────────────────────────────── */

  const curWkId = currentWeekId();
  const streak = computeStreak(days);

  useEffect(() => { saveState(state); }, [state]);

  // ── MIDNIGHT AUTO-REFRESH: re-renders app at midnight so live date updates ──
  const [, forceUpdate] = React.useReducer(x => x + 1, 0);
  useEffect(() => {
    const msUntilMidnight = () => {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1) - now;
    };
    let timeout;
    const scheduleMidnightTick = () => {
      timeout = setTimeout(() => {
        forceUpdate();
        scheduleMidnightTick();
      }, msUntilMidnight());
    };
    scheduleMidnightTick();
    return () => clearTimeout(timeout);
  }, []);



  const toggleDay = useCallback((key) => {
    setState(s => {
      const newDays = { ...s.days, [key]: !s.days[key] };
      const msg = newDays[key] ? '✅ Day marked complete!' : '↩ Unmarked';
      setToast(msg);
      setTimeout(() => setToast(null), 2000);
      return { ...s, days: newDays, lastUpdated: new Date().toISOString() };
    });
  }, []);

  const totalDone = Object.values(days).filter(Boolean).length;
  const totalTasks = Object.keys(days).length;
  const overallProgress = Math.round((totalDone / totalTasks) * 100);
  const daysLeft = Math.max(0, daysDiff(today(), END));
  const daysGone = daysSinceStart();

  const filteredWeeks = filter === 'all' ? WEEKS

      const p = PHASES.find(p => p.weeks.includes(w.id));

        <h1>20 LPA+ Placement<br/>Roadmap Tracker</h1>
        <div className="header-sub">
          Striver A–Z DSA • 111 Days • 4 Phases • 455 Problems
        </div>
      </div>

      {/* Quick Stats */}

          <div className="stat-val c-blue">{overallProgress}%</div>
          <div className="stat-label">Overall Done</div>
        </div>
        <div className="stat-card">
          <div className="stat-val c-yellow">{streak}</div>
          <div className="stat-label">Day Streak 🔥</div>
        </div>
        <div className="stat-card">
          <div className="stat-val c-green">{totalDone}</div>
          <div className="stat-label">Tasks Completed</div>
        </div>
        <div className="stat-card">
          <div className="stat-val c-red">{daysLeft}</div>
          <div className="stat-label">Days Remaining</div>
        </div>
        <div className="stat-card">
          <div className="stat-val c-purple">{daysGone}</div>
          <div className="stat-label">Days Elapsed</div>
        </div>
        <div className="stat-card">
          <div className="stat-val" style={{color:'var(--orange)'}}>W{curWkId}</div>
          <div className="stat-label">Current Week</div>
        </div>
      </div>

      {/* Overall progress bar */}
